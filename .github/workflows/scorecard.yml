name: OpenSSF Scorecard

# Scorecard ran on every push to main, which compounded the per-merge
# Actions bill. The weekly schedule + branch-protection-rule trigger
# keeps the OpenSSF result fresh; `workflow_dispatch` covers ad-hoc
# audits.
on:
  branch_protection_rule:
  schedule:
    - cron: '25 3 * * 1'
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      actions: read
      contents: read
      checks: read
      issues: read
      pull-requests: read

    steps:
      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF results to Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
